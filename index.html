<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menú de dinar · Escola El Pi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=2">
</head>
<body>

  <header>
    <h1 class="school-name"><em>Escola El Pi</em></h1>
    <p class="subtitle" id="uiSubtitle">Subscripció al calendari</p>
    <span class="month-badge" id="monthBadge">Carregant...</span>
  </header>

  <div class="lang-tabs" role="tablist" aria-label="Selecciona l'idioma">
    <button class="lang-tab active" role="tab" aria-selected="true"  onclick="switchLang('ca')">Català</button>
    <button class="lang-tab"        role="tab" aria-selected="false" onclick="switchLang('es')">Castellano</button>
    <button class="lang-tab"        role="tab" aria-selected="false" onclick="switchLang('en')">English</button>
  </div>

  <div id="panel-ca" class="lang-panel active" role="tabpanel"><div class="loading">Carregant...</div></div>
  <div id="panel-es" class="lang-panel"        role="tabpanel"><div class="loading">Cargando...</div></div>
  <div id="panel-en" class="lang-panel"        role="tabpanel"><div class="loading">Loading...</div></div>

  <footer>
    <p class="footer" id="uiFooter">S'actualitza automàticament cada mes. Subscriu-te una vegada.</p>
  </footer>

  <script>
    const BASE     = 'https://uxmikko.github.io/school-lunch-calendar/el-pi/';
    const MANIFEST = BASE + 'manifest.json';

    // All UI strings per language
    const UI = {
      ca: {
        lang:         'ca',
        htmlLang:     'ca',
        title:        'Menú de dinar · Escola El Pi',
        subtitle:     'Subscripció al calendari',
        monthLabel:   m => m,
        section:      'Tria el teu menú',
        footer:       "S'actualitza automàticament cada mes. Subscriu-te una vegada.",
        loading:      'Carregant...',
        error:        "No s'ha pogut carregar el menú. Torna-ho a intentar.",
        menus: {
          standard:    { text: 'Menú estàndard',  tag: 'Inclou sopar suggerit' },
          no_pork:     { text: 'Sense porc',       tag: '' },
          gluten_free: { text: 'Sense gluten',     tag: '' },
        },
      },
      es: {
        lang:         'es',
        htmlLang:     'es',
        title:        'Menú de almuerzo · Escola El Pi',
        subtitle:     'Suscripción al calendario',
        monthLabel:   m => m,
        section:      'Elige tu menú',
        footer:       'Se actualiza automáticamente cada mes. Suscríbete una vez.',
        loading:      'Cargando...',
        error:        'No se ha podido cargar el menú. Vuelve a intentarlo.',
        menus: {
          standard:    { text: 'Menú estándar',    tag: 'Incluye sugerencia de cena' },
          no_pork:     { text: 'Sin cerdo',        tag: '' },
          gluten_free: { text: 'Sin gluten',       tag: '' },
        },
      },
      en: {
        lang:         'en',
        htmlLang:     'en',
        title:        'Lunch menu · Escola El Pi',
        subtitle:     'Calendar subscription',
        monthLabel:   m => m,
        section:      'Choose your menu',
        footer:       'Updated automatically each month. Subscribe once.',
        loading:      'Loading...',
        error:        'Could not load menu. Please try again.',
        menus: {
          standard:    { text: 'Standard menu',    tag: 'Includes dinner suggestions' },
          no_pork:     { text: 'No pork',          tag: '' },
          gluten_free: { text: 'Gluten free',      tag: '' },
        },
      },
    };

    const MONTH_NAMES = {
      ca: { Gener:'Gener',Febrer:'Febrer',Març:'Març',Abril:'Abril',Maig:'Maig',Juny:'Juny',
            Juliol:'Juliol',Agost:'Agost',Setembre:'Setembre',Octubre:'Octubre',Novembre:'Novembre',Desembre:'Desembre' },
      es: { Gener:'Enero',Febrer:'Febrero',Març:'Marzo',Abril:'Abril',Maig:'Mayo',Juny:'Junio',
            Juliol:'Julio',Agost:'Agosto',Setembre:'Septiembre',Octubre:'Octubre',Novembre:'Noviembre',Desembre:'Diciembre' },
      en: { Gener:'January',Febrer:'February',Març:'March',Abril:'April',Maig:'May',Juny:'June',
            Juliol:'July',Agost:'August',Setembre:'September',Octubre:'October',Novembre:'November',Desembre:'December' },
    };

    let manifest  = null;
    let activeLang = 'ca';

    // Device-aware subscription
    function subscribeMenu(httpsUrl) {
      const isAndroid = /android/i.test(navigator.userAgent);
      if (isAndroid) {
        window.open(
          'https://calendar.google.com/calendar/r/settings/addbyurl?url=' + encodeURIComponent(httpsUrl),
          '_blank'
        );
      } else {
        window.location.href = httpsUrl.replace('https://', 'webcal://');
      }
    }

    function getMonthLabel(lang) {
      if (!manifest) return '';
      const caMonth = manifest.month_ca;
      const translated = MONTH_NAMES[lang][caMonth] || caMonth;
      return `${translated} ${manifest.year}`;
    }

    function buildPanel(lang) {
      if (!manifest) return;
      const panel  = document.getElementById('panel-' + lang);
      const files  = manifest.files[lang];
      const ui     = UI[lang];

      let html = `<div class="lang-section"><p class="item-tag" style="padding:0 0.2rem 0.6rem;">${ui.section}</p><div class="menu-card">`;
      ['standard', 'no_pork', 'gluten_free'].forEach(type => {
        const httpsUrl = BASE + files[type];
        const label    = ui.menus[type];
        html += `<div class="menu-item" onclick="subscribeMenu('${httpsUrl}')" role="button" tabindex="0"
                      onkeydown="if(event.key==='Enter'||event.key===' ')subscribeMenu('${httpsUrl}')">
          <div class="item-left">
            <span class="item-icon" aria-hidden="true">🍽️</span>
            <div>
              <div class="item-text">${label.text}</div>
              ${label.tag ? `<div class="item-tag">${label.tag}</div>` : ''}
            </div>
          </div>
          <span class="subscribe-arrow" aria-hidden="true">＋</span>
        </div>`;
      });
      html += '</div></div>';
      panel.innerHTML = html;
    }

    function updatePageUI(lang) {
      const ui = UI[lang];
      document.documentElement.lang          = ui.htmlLang;
      document.title                         = ui.title;
      document.getElementById('uiSubtitle').textContent = ui.subtitle;
      document.getElementById('uiFooter').textContent   = ui.footer;
      document.getElementById('monthBadge').textContent  = getMonthLabel(lang);

      // Update aria-selected on tabs
      document.querySelectorAll('.lang-tab').forEach((t, i) => {
        const isActive = ['ca','es','en'][i] === lang;
        t.classList.toggle('active', isActive);
        t.setAttribute('aria-selected', isActive ? 'true' : 'false');
      });

      document.querySelectorAll('.lang-panel').forEach(p => {
        p.classList.toggle('active', p.id === 'panel-' + lang);
      });
    }

    function switchLang(lang) {
      activeLang = lang;
      updatePageUI(lang);
    }

    // Auto-detect language on load
    function detectLang() {
      const ul = navigator.language || '';
      if (ul.startsWith('es')) return 'es';
      if (ul.startsWith('ca')) return 'ca';
      return 'en';
    }

    fetch(MANIFEST + '?v=' + Date.now())
      .then(r => r.json())
      .then(data => {
        manifest = data;
        buildPanel('ca');
        buildPanel('es');
        buildPanel('en');
        const lang = detectLang();
        activeLang = lang;
        updatePageUI(lang);
      })
      .catch(() => {
        ['ca','es','en'].forEach(l => {
          document.getElementById('panel-' + l).innerHTML =
            `<div class="loading">${UI[l].error}</div>`;
        });
        document.getElementById('monthBadge').textContent = '—';
      });
  </script>

</body>
</html>
