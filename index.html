<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menú Escolar · Escola El Pi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1 class="school-name">Menú<br><em>Escola El Pi</em></h1>
    <p class="subtitle">Calendar subscription</p>
    <span class="month-badge" id="monthBadge">Loading...</span>
  </header>

  <div class="lang-tabs">
    <button class="lang-tab active" onclick="switchLang('ca')">Català</button>
    <button class="lang-tab" onclick="switchLang('es')">Castellano</button>
    <button class="lang-tab" onclick="switchLang('en')">English</button>
  </div>

  <div id="panel-ca" class="lang-panel active"><div class="loading">Loading...</div></div>
  <div id="panel-es" class="lang-panel"><div class="loading">Loading...</div></div>
  <div id="panel-en" class="lang-panel"><div class="loading">Loading...</div></div>

  <div class="footer">
    Updated automatically each month.<br>
    Subscribe once — your calendar does the rest.<br><br>
    <a href="https://www.notion.so/334869ed9fff812484bbd514900dcafa">← Notion page</a>
  </div>

  <script>
    const BASE     = 'https://uxmikko.github.io/school-lunch-calendar/el-pi/';
    const MANIFEST = BASE + 'manifest.json';

    const LABELS = {
      ca: {
        standard:    { text: 'Menú estàndard',  tag: 'Inclou sopar suggerit' },
        no_pork:     { text: 'Sense porc',       tag: '' },
        gluten_free: { text: 'Sense gluten',     tag: '' },
      },
      es: {
        standard:    { text: 'Menú estándar',    tag: 'Con sugerencia de cena' },
        no_pork:     { text: 'Sin cerdo',        tag: '' },
        gluten_free: { text: 'Sin gluten',       tag: '' },
      },
      en: {
        standard:    { text: 'Standard menu',    tag: 'Includes dinner suggestions' },
        no_pork:     { text: 'No pork',          tag: '' },
        gluten_free: { text: 'Gluten free',      tag: '' },
      },
    };

    function subscribeMenu(httpsUrl) {
      const isAndroid = /android/i.test(navigator.userAgent);
      if (isAndroid) {
        window.open(
          'https://calendar.google.com/calendar/r/settings/addbyurl?url=' + encodeURIComponent(httpsUrl),
          '_blank'
        );
      } else {
        window.location.href = httpsUrl.replace('https://', 'webcal://');
      }
    }

    function buildPanel(lang, manifest) {
      const panel  = document.getElementById('panel-' + lang);
      const files  = manifest.files[lang];
      const labels = LABELS[lang];

      let html = '<div class="lang-section"><div class="menu-card">';
      ['standard', 'no_pork', 'gluten_free'].forEach(type => {
        const httpsUrl = BASE + files[type];
        const label    = labels[type];
        html += `<div class="menu-item" onclick="subscribeMenu('${httpsUrl}')">
          <div class="item-left">
            <span class="item-icon">🍽️</span>
            <div>
              <div class="item-text">${label.text}</div>
              ${label.tag ? `<div class="item-tag">${label.tag}</div>` : ''}
            </div>
          </div>
          <span class="subscribe-arrow">＋</span>
        </div>`;
      });
      html += '</div></div>';
      panel.innerHTML = html;
    }

    function switchLang(lang) {
      document.querySelectorAll('.lang-tab').forEach((t, i) => {
        t.classList.toggle('active', ['ca','es','en'][i] === lang);
      });
      document.querySelectorAll('.lang-panel').forEach(p => {
        p.classList.toggle('active', p.id === 'panel-' + lang);
      });
    }

    fetch(MANIFEST + '?v=' + Date.now())
      .then(r => r.json())
      .then(manifest => {
        const ul   = navigator.language;
        const lang = ul.startsWith('es') ? 'es' : ul.startsWith('ca') ? 'ca' : 'en';
        const ml   = { ca: manifest.month_ca, es: manifest.month_es, en: manifest.month_en }[lang];
        document.getElementById('monthBadge').textContent = ml + ' ' + manifest.year;
        buildPanel('ca', manifest);
        buildPanel('es', manifest);
        buildPanel('en', manifest);
      })
      .catch(() => {
        document.getElementById('monthBadge').textContent = 'Error';
        ['ca','es','en'].forEach(l => {
          document.getElementById('panel-' + l).innerHTML =
            '<div class="loading">Could not load menu. Please try again later.</div>';
        });
      });
  </script>

</body>
</html>
